<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎆 Tap Fireworks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }
  #game { position: relative; width: 100vw; height: 100vh; overflow: hidden;
    background: radial-gradient(circle at 50% 20%, #2a2a5e 0%, #14143a 60%, #0a0a22 100%); }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; background: rgba(0,0,0,0.5); color: #fff; padding: 24px; z-index: 10; }
  .overlay h1 { font-size: clamp(38px, 9vw, 74px); text-shadow: 3px 3px 0 #ff7eb9; }
  .overlay p { font-size: clamp(16px, 4vw, 24px); margin: 12px 0; }
  .btn { margin-top: 16px; padding: 18px 46px; font-size: clamp(22px, 6vw, 36px); font-family: inherit;
    border: none; border-radius: 50px; background: #ff7eb9; color: #5a1336; cursor: pointer; box-shadow: 0 8px 0 #c64f86; }
  .btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #c64f86; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas"></canvas>
  <div id="startScreen" class="overlay">
    <h1>🎆 Tap Fireworks</h1>
    <p>Tap anywhere to light up the sky! ✨</p>
    <button class="btn" id="startBtn">Play ▶</button>
  </div>
</div>
<script src="../shared/banter.js"></script>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let DPR = Math.min(window.devicePixelRatio || 1, 2), W, H;
function resize() { DPR = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = (W = canvas.clientWidth) * DPR; canvas.height = (H = canvas.clientHeight) * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0); makeStars(); }
window.addEventListener("resize", resize);

const COLS = ["#ff7eb9", "#7afcff", "#feff9c", "#ff9a76", "#b28dff", "#8effa0", "#ffd36e", "#ff5e5e"];
let parts = [], rockets = [], stars = [], playing = false, started = false;

function makeStars() { stars = []; for (let i = 0; i < 60; i++) stars.push({ x: Math.random() * W, y: Math.random() * H * 0.7, r: Math.random() * 1.6 + 0.3, tw: Math.random() * Math.PI * 2 }); }

function launch(tx, ty) {
  rockets.push({ x: tx, y: H, tx, ty, color: COLS[Math.floor(Math.random() * COLS.length)] });
  Banter.sfx("strike");
}
function explode(x, y, color) {
  Banter.sfx("six");
  const n = 30 + Math.floor(Math.random() * 20);
  for (let i = 0; i < n; i++) { const a = (Math.PI * 2 * i) / n, sp = 2 + Math.random() * 4;
    parts.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color }); }
}
canvas.addEventListener("pointerdown", (e) => {
  if (!playing) return;
  const rect = canvas.getBoundingClientRect();
  launch(e.clientX - rect.left, Math.max((e.clientY - rect.top), H * 0.18));
});

function loop() {
  ctx.fillStyle = "rgba(10,10,34,0.28)"; ctx.fillRect(0, 0, W, H); // trails
  for (const s of stars) { s.tw += 0.05; ctx.globalAlpha = 0.4 + Math.sin(s.tw) * 0.3;
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill(); }
  ctx.globalAlpha = 1;
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i]; r.y -= Math.max(6, (r.y - r.ty) * 0.12);
    ctx.fillStyle = r.color; ctx.beginPath(); ctx.arc(r.x, r.y, 4, 0, Math.PI * 2); ctx.fill();
    if (r.y <= r.ty + 6) { explode(r.x, r.ty, r.color); rockets.splice(i, 1); }
  }
  parts = parts.filter((p) => p.life > 0);
  for (const p of parts) { p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.vx *= 0.99; p.life -= 0.012;
    ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; }
  requestAnimationFrame(loop);
}

document.getElementById("startBtn").addEventListener("click", () => {
  document.getElementById("startScreen").classList.add("hidden");
  playing = true; if (window.Banter) Banter.startMusic();
  if (!started) { started = true; resize(); loop(); }
});
</script>
</body>
</html>
