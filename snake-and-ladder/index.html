<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐍 Snakes & Ladders — Pass & Play</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    overflow: hidden;
    background: #1e3a2b;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  #game {
    position: relative; width: 100vw; height: 100vh;
    background: radial-gradient(circle at 50% 30%, #2e5d43 0%, #16281d 100%);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  canvas { display: block; flex: 1; width: 100%; touch-action: none; }

  .overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(0,0,0,0.55); color: #fff; padding: 24px; z-index: 10;
  }
  .overlay h1 { font-size: clamp(30px, 7vw, 60px); text-shadow: 3px 3px 0 #27ae60; }
  .overlay p { font-size: clamp(15px, 3vw, 22px); margin: 10px 0; max-width: 600px; }
  .btn {
    margin-top: 10px; padding: 14px 30px; font-size: clamp(18px, 4vw, 26px);
    font-family: inherit; border: none; border-radius: 50px;
    background: #27ae60; color: #fff; cursor: pointer; box-shadow: 0 6px 0 #1e8449;
    transition: transform .05s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e8449; }
  .btnRow { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }
  .pcBtn {
    width: 64px; height: 64px; border-radius: 18px; border: 3px solid transparent;
    background: rgba(255,255,255,0.15); color: #fff; font-size: 26px; font-family: inherit;
    cursor: pointer;
  }
  .pcBtn.sel { border-color: #f1c40f; background: rgba(241,196,15,0.25); }
  .hidden { display: none !important; }

  #topbar {
    position: absolute; top: 10px; left: 10px; right: 10px; z-index: 5;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .pill {
    background: rgba(255,255,255,0.92); padding: 7px 14px; border-radius: 16px;
    font-size: clamp(13px, 3.2vw, 20px); color: #2c3e50; box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    white-space: nowrap; font-weight: bold;
  }
  #resetBtn {
    margin-left: auto; background: rgba(255,255,255,0.92); border: none; font-family: inherit;
    padding: 7px 14px; border-radius: 16px; font-size: clamp(13px, 3.2vw, 18px);
    color: #2c3e50; cursor: pointer; box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }

  #docker {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    z-index: 6; display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  #rollMsg { color: #ecf0f1; font-size: clamp(13px, 3vw, 18px); min-height: 1.2em; text-shadow: 0 1px 3px #000; }
  #dice {
    width: clamp(64px, 16vw, 86px); height: clamp(64px, 16vw, 86px);
    background: #fff; border-radius: 16px; cursor: pointer;
    box-shadow: 0 6px 0 #b0b0b0, 0 10px 16px rgba(0,0,0,0.4);
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
    padding: 14%; gap: 6%;
    transition: transform .06s;
  }
  #dice:active { transform: translateY(3px); }
  #dice.disabled { opacity: .5; cursor: default; pointer-events: none; }
  .dot { background: #2c3e50; border-radius: 50%; align-self: center; justify-self: center; width: 78%; height: 78%; visibility: hidden; }
  /* pip layout per face uses grid areas a..i */
  .dot.s { visibility: visible; }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas"></canvas>

  <div id="topbar" class="hidden">
    <div class="pill" id="turnPill">Turn</div>
    <button id="resetBtn">↺ New</button>
  </div>

  <div id="docker" class="hidden">
    <div id="rollMsg">Tap the dice to roll 🎲</div>
    <div id="dice" title="Roll">
      <div class="dot" data-i="0"></div><div class="dot" data-i="1"></div><div class="dot" data-i="2"></div>
      <div class="dot" data-i="3"></div><div class="dot" data-i="4"></div><div class="dot" data-i="5"></div>
      <div class="dot" data-i="6"></div><div class="dot" data-i="7"></div><div class="dot" data-i="8"></div>
    </div>
  </div>

  <!-- Start -->
  <div id="startScreen" class="overlay">
    <h1>🐍 Snakes &amp; Ladders 🪜</h1>
    <p>One phone, everyone plays. Tap the dice on your turn, climb the ladders,
       dodge the snakes, and race to <b>100</b>. Roll a 6 and go again!</p>
    <p style="font-size:clamp(14px,3vw,20px);opacity:.85">How many players?</p>
    <div class="btnRow" id="pcRow">
      <button class="pcBtn sel" data-n="2">2</button>
      <button class="pcBtn" data-n="3">3</button>
      <button class="pcBtn" data-n="4">4</button>
    </div>
    <button class="btn" id="startBtn">Start</button>
  </div>

  <!-- End -->
  <div id="endScreen" class="overlay hidden">
    <h1 id="endTitle">🏆</h1>
    <p id="endMsg"></p>
    <button class="btn" id="againBtn">Play Again</button>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let DPR = Math.min(window.devicePixelRatio || 1, 2);

// ---- Board data (classic Milton-Bradley style) ----
const LADDERS = { 1:38, 4:14, 9:31, 21:42, 28:84, 36:44, 51:67, 71:91, 80:100 };
const SNAKES  = { 16:6, 47:26, 49:11, 56:53, 62:19, 64:60, 87:24, 93:73, 95:75, 98:78 };
const JUMP = { ...LADDERS, ...SNAKES };

const COLORS = [
  { name: "Red",    fill: "#e74c3c", dark: "#a93226" },
  { name: "Blue",   fill: "#3498db", dark: "#21618c" },
  { name: "Green",  fill: "#2ecc71", dark: "#1e8449" },
  { name: "Yellow", fill: "#f1c40f", dark: "#b8860b" },
];

// ---- Layout ----
let W, H, B, OX, OY, cell;   // board size B, origin OX/OY, cell size
function computeLayout() {
  W = canvas.clientWidth; H = canvas.clientHeight;
  B = Math.min(W * 0.96, H * 0.82);
  cell = B / 10;
  OX = (W - B) / 2;
  OY = (H - B) / 2 - H * 0.01;
}
function cellCenter(n) {
  // n: 1..100, row 0 at bottom, boustrophedon
  const idx = n - 1;
  const row = Math.floor(idx / 10);
  let col = idx % 10;
  if (row % 2 === 1) col = 9 - col;
  const x = OX + col * cell + cell / 2;
  const y = OY + (9 - row) * cell + cell / 2;
  return { x, y };
}

// ---- State ----
let players = [], turnIndex = 0, state = "idle";
let pendingPlayers = 2;
let anim = null;          // {fromN,toN,t,dur,kind}
let segQueue = [];        // upcoming {to,kind}
let lastRoll = 0, rolledSix = false;
let diceAnimUntil = 0, rollMsg = "Tap the dice to roll 🎲";

function newGame(n) {
  computeLayout();
  players = [];
  for (let i = 0; i < n; i++) players.push({ ...COLORS[i], pos: 0, ax: 0, ay: 0, finished: false });
  // place tokens at start (just below cell 1)
  players.forEach((p, i) => { const c = startSpot(i); p.ax = c.x; p.ay = c.y; });
  turnIndex = 0;
  anim = null; segQueue = []; lastRoll = 0; rolledSix = false;
  state = "ready";
  rollMsg = players[0].name + ": tap the dice 🎲";
  document.getElementById("topbar").classList.remove("hidden");
  document.getElementById("docker").classList.remove("hidden");
  endScreen.classList.add("hidden");
  setDiceFace(0);
  updateHUD();
}

function startSpot(i) {
  // four little staging dots beneath the board
  const x = OX + (i + 0.5) * (B / 4);
  const y = OY + B + cell * 0.55;
  return { x, y };
}
function tokenOffset(i) {
  // spread tokens that share a cell
  const dx = [(-1), 1, -1, 1][i] * cell * 0.18;
  const dy = [(-1), -1, 1, 1][i] * cell * 0.18;
  return { dx, dy };
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = canvas.clientWidth * DPR;
  canvas.height = canvas.clientHeight * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  computeLayout();
  // snap idle tokens to their logical cells
  if (players.length && !anim && segQueue.length === 0) {
    players.forEach((p, i) => {
      const c = p.pos === 0 ? startSpot(i) : cellCenter(p.pos);
      const o = tokenOffset(i);
      p.ax = c.x + (p.pos === 0 ? 0 : o.dx);
      p.ay = c.y + (p.pos === 0 ? 0 : o.dy);
    });
  }
}
window.addEventListener("resize", resize);

// ---- Dice ----
const FACE_PIPS = {
  1: [4], 2: [0, 8], 3: [0, 4, 8], 4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8],
};
const diceEl = document.getElementById("dice");
const dots = [...diceEl.querySelectorAll(".dot")];
function setDiceFace(f) {
  dots.forEach((d, i) => d.classList.toggle("s", f > 0 && FACE_PIPS[f].includes(i)));
}

function rollDice() {
  if (state !== "ready") return;
  state = "rolling";
  diceAnimUntil = Date.now() + 650;
  rollMsg = "Rolling…";
  diceEl.classList.add("disabled");
  updateHUD();
}

function finishRoll() {
  lastRoll = 1 + Math.floor(Math.random() * 6);
  setDiceFace(lastRoll);
  rolledSix = lastRoll === 6;
  diceEl.classList.remove("disabled");
  const p = players[turnIndex];
  const target = p.pos + lastRoll;
  segQueue = [];
  if (target <= 100) {
    for (let k = p.pos + 1; k <= target; k++) segQueue.push({ to: k, kind: "step" });
    if (JUMP[target]) segQueue.push({ to: JUMP[target], kind: JUMP[target] > target ? "ladder" : "snake" });
    rollMsg = p.name + " rolled " + lastRoll;
    state = "moving";
  } else {
    rollMsg = p.name + " rolled " + lastRoll + " — need exact, stay put";
    endTurn();
  }
}

// ---- Turn flow ----
function startSegment() {
  const seg = segQueue.shift();
  const p = players[turnIndex];
  anim = {
    fromN: p.pos, toN: seg.to, kind: seg.kind, t: 0,
    dur: seg.kind === "step" ? 14 : 26,
  };
}
function finishSegment() {
  const p = players[turnIndex];
  p.pos = anim.toN;
  if (anim.kind === "snake") rollMsg = p.name + " hit a snake! 🐍 down to " + p.pos;
  else if (anim.kind === "ladder") rollMsg = p.name + " climbed a ladder! 🪜 up to " + p.pos;
  anim = null;
  if (p.pos === 100) { p.finished = true; return win(p); }
  if (segQueue.length === 0) endTurn();
}
function endTurn() {
  if (rolledSix) {
    state = "ready";
    rollMsg = players[turnIndex].name + " rolled a 6 — go again! 🎲";
  } else {
    turnIndex = (turnIndex + 1) % players.length;
    state = "ready";
    rollMsg = players[turnIndex].name + ": tap the dice 🎲";
  }
  updateHUD();
}

// ---- Render ----
function rr(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

function drawBoard() {
  // backing
  ctx.fillStyle = "#6b4423";
  rr(OX - cell * 0.12, OY - cell * 0.12, B + cell * 0.24, B + cell * 0.24, cell * 0.2); ctx.fill();
  // cells
  ctx.font = `${Math.max(9, cell * 0.2)}px "Trebuchet MS", sans-serif`;
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  for (let n = 1; n <= 100; n++) {
    const c = cellCenter(n);
    const x = c.x - cell / 2, y = c.y - cell / 2;
    const idx = n - 1, row = Math.floor(idx / 10), col = idx % 10;
    const tint = (row + col) % 2 === 0 ? "#f6e7c1" : "#e8cf97";
    ctx.fillStyle = tint;
    ctx.fillRect(x, y, cell, cell);
    ctx.strokeStyle = "rgba(107,68,35,0.35)"; ctx.lineWidth = 1;
    ctx.strokeRect(x, y, cell, cell);
    ctx.fillStyle = "rgba(80,55,20,0.7)";
    ctx.fillText(n, x + cell * 0.08, y + cell * 0.06);
  }
  drawLadders();
  drawSnakes();
}

function drawLadders() {
  for (const from in LADDERS) {
    const a = cellCenter(+from), b = cellCenter(LADDERS[from]);
    const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy);
    const ux = dx / len, uy = dy / len;            // along
    const px = -uy, py = ux;                         // perpendicular
    const wRail = cell * 0.16;
    ctx.strokeStyle = "#b9762f"; ctx.lineWidth = Math.max(3, cell * 0.06); ctx.lineCap = "round";
    for (const s of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(a.x + px * wRail * s, a.y + py * wRail * s);
      ctx.lineTo(b.x + px * wRail * s, b.y + py * wRail * s);
      ctx.stroke();
    }
    const rungs = Math.max(2, Math.floor(len / (cell * 0.5)));
    ctx.lineWidth = Math.max(2, cell * 0.04);
    for (let i = 1; i < rungs; i++) {
      const t = i / rungs;
      const mx = a.x + dx * t, my = a.y + dy * t;
      ctx.beginPath();
      ctx.moveTo(mx + px * wRail, my + py * wRail);
      ctx.lineTo(mx - px * wRail, my - py * wRail);
      ctx.stroke();
    }
  }
}

function drawSnakes() {
  let ci = 0;
  const snakeColors = ["#27ae60", "#16a085", "#8e44ad", "#d35400", "#c0392b"];
  for (const from in SNAKES) {
    const head = cellCenter(+from), tail = cellCenter(SNAKES[from]);
    const col = snakeColors[ci % snakeColors.length]; ci++;
    const dx = tail.x - head.x, dy = tail.y - head.y, len = Math.hypot(dx, dy);
    const px = -dy / len, py = dx / len;
    ctx.strokeStyle = col; ctx.lineWidth = Math.max(5, cell * 0.16); ctx.lineCap = "round";
    const wig = cell * 0.5;
    ctx.beginPath();
    ctx.moveTo(head.x, head.y);
    ctx.bezierCurveTo(
      head.x + dx * 0.33 + px * wig, head.y + dy * 0.33 + py * wig,
      head.x + dx * 0.66 - px * wig, head.y + dy * 0.66 - py * wig,
      tail.x, tail.y
    );
    ctx.stroke();
    // head
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(head.x, head.y, cell * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(head.x - cell * 0.07, head.y - cell * 0.05, cell * 0.05, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(head.x + cell * 0.07, head.y - cell * 0.05, cell * 0.05, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#000";
    ctx.beginPath(); ctx.arc(head.x - cell * 0.07, head.y - cell * 0.05, cell * 0.022, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(head.x + cell * 0.07, head.y - cell * 0.05, cell * 0.022, 0, Math.PI * 2); ctx.fill();
  }
}

function drawToken(p, i, lifted) {
  const r = cell * 0.26;
  const x = p.ax, y = p.ay;
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.beginPath(); ctx.ellipse(x, y + r * 0.7, r * 0.85, r * 0.4, 0, 0, Math.PI * 2); ctx.fill();
  const yy = y - (lifted || 0);
  const g = ctx.createRadialGradient(x - r * 0.3, yy - r * 0.4, r * 0.2, x, yy, r);
  g.addColorStop(0, "#fff"); g.addColorStop(0.25, p.fill); g.addColorStop(1, p.dark);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, yy, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, yy, r * 0.6, 0, Math.PI * 2); ctx.stroke();
  if (p.finished) {
    ctx.fillStyle = "#fff"; ctx.font = `${r}px serif`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("★", x, yy);
  }
}

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

function update() {
  if (state === "rolling" && Date.now() >= diceAnimUntil) { finishRoll(); }
  else if (state === "rolling") { setDiceFace(1 + Math.floor(Date.now() / 70) % 6); }

  if (state === "moving") {
    if (!anim && segQueue.length) startSegment();
    if (anim) {
      anim.t++;
      if (anim.t >= anim.dur) finishSegment();
    }
  }
}

function tokenLogicalSpot(p, i) {
  const c = p.pos === 0 ? startSpot(i) : cellCenter(p.pos);
  const o = tokenOffset(i);
  return { x: c.x + (p.pos === 0 ? 0 : o.dx), y: c.y + (p.pos === 0 ? 0 : o.dy) };
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  if (!players.length) { drawBoard(); return; }
  drawBoard();

  const activeP = players[turnIndex];
  players.forEach((p, i) => {
    if (anim && p === activeP) {
      const from = anim.fromN === 0 ? startSpot(i) : cellCenter(anim.fromN);
      const to = cellCenter(anim.toN);
      const o = tokenOffset(i);
      const fx = from.x + (anim.fromN === 0 ? 0 : o.dx), fy = from.y + (anim.fromN === 0 ? 0 : o.dy);
      const tx = to.x + o.dx, ty = to.y + o.dy;
      const k = easeInOut(Math.min(1, anim.t / anim.dur));
      p.ax = fx + (tx - fx) * k; p.ay = fy + (ty - fy) * k;
      const lift = anim.kind === "step" ? Math.sin(k * Math.PI) * cell * 0.3 : 0;
      drawToken(p, i, lift);
    } else {
      const s = tokenLogicalSpot(p, i);
      p.ax = s.x; p.ay = s.y;
      drawToken(p, i, 0);
    }
  });
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// ---- HUD / screens ----
const startScreen = document.getElementById("startScreen");
const endScreen = document.getElementById("endScreen");
function updateHUD() {
  if (!players.length) return;
  const p = players[turnIndex];
  const tp = document.getElementById("turnPill");
  tp.innerHTML = `▸ ${p.name}` + (p.pos ? ` · sq ${p.pos}` : "");
  tp.style.background = p.fill; tp.style.color = "#fff";
  document.getElementById("rollMsg").textContent = rollMsg;
}
function win(p) {
  state = "won";
  document.getElementById("endTitle").textContent = "🏆 " + p.name + " wins!";
  document.getElementById("endMsg").innerHTML = p.name + " reached 100 first! 🎉";
  endScreen.classList.remove("hidden");
}

// player count picker
document.querySelectorAll(".pcBtn").forEach((b) => b.addEventListener("click", () => {
  document.querySelectorAll(".pcBtn").forEach(x => x.classList.remove("sel"));
  b.classList.add("sel"); pendingPlayers = +b.dataset.n;
}));
document.getElementById("startBtn").addEventListener("click", () => { startScreen.classList.add("hidden"); newGame(pendingPlayers); });
document.getElementById("againBtn").addEventListener("click", () => {
  endScreen.classList.add("hidden"); startScreen.classList.remove("hidden");
  document.getElementById("topbar").classList.add("hidden");
  document.getElementById("docker").classList.add("hidden");
  players = []; state = "idle";
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if (state === "moving" || state === "rolling") return;
  endScreen.classList.add("hidden"); startScreen.classList.remove("hidden");
  document.getElementById("topbar").classList.add("hidden");
  document.getElementById("docker").classList.add("hidden");
  players = []; state = "idle";
});
diceEl.addEventListener("click", rollDice);

// ---- Boot ----
resize();
state = "idle";
loop();
</script>
</body>
</html>
