<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🫧 Bubble Pop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    overflow: hidden; background: #aee0ff; user-select: none; -webkit-user-select: none; touch-action: none; }
  #game { position: relative; width: 100vw; height: 100vh;
    background: linear-gradient(#bfe9ff 0%, #d9f3ff 60%, #eafbff 100%); overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; background: rgba(0,0,0,0.4); color: #fff; padding: 24px; z-index: 10; }
  .overlay h1 { font-size: clamp(40px, 10vw, 80px); text-shadow: 3px 3px 0 #2b8fd6; }
  .overlay p { font-size: clamp(16px, 4vw, 24px); margin: 12px 0; }
  .btn { margin-top: 16px; padding: 18px 46px; font-size: clamp(22px, 6vw, 36px); font-family: inherit;
    border: none; border-radius: 50px; background: #2b8fd6; color: #fff; cursor: pointer; box-shadow: 0 8px 0 #1f6fb2; }
  .btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #1f6fb2; }
  #count { position: absolute; top: 12px; right: 14px; z-index: 5; background: rgba(255,255,255,0.9);
    padding: 8px 18px; border-radius: 20px; font-size: clamp(20px, 5vw, 30px); color: #2b8fd6; box-shadow: 0 3px 8px rgba(0,0,0,0.2); }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas"></canvas>
  <div id="count" class="hidden">🫧 <span id="n">0</span></div>
  <div id="startScreen" class="overlay">
    <h1>🫧 Bubble Pop</h1>
    <p>Tap the bubbles to pop them! 🎉</p>
    <button class="btn" id="startBtn">Play ▶</button>
  </div>
</div>
<script src="../shared/banter.js"></script>
<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let DPR = Math.min(window.devicePixelRatio || 1, 2), W, H;
function resize() { DPR = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = (W = canvas.clientWidth) * DPR; canvas.height = (H = canvas.clientHeight) * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0); }
window.addEventListener("resize", resize); resize();

const COLORS = ["#ff7eb9", "#7afcff", "#feff9c", "#ff9a76", "#b28dff", "#8effa0", "#ffd36e"];
let bubbles = [], bursts = [], count = 0, playing = false, spawnT = 0, started = false;

function spawn() {
  const r = Math.min(W, H) * (0.07 + Math.random() * 0.06);
  bubbles.push({ x: r + Math.random() * (W - 2 * r), y: H + r, r,
    vy: -(0.6 + Math.random() * 0.9) * (Math.min(W, H) / 600 + 0.6),
    wob: Math.random() * Math.PI * 2, color: COLORS[Math.floor(Math.random() * COLORS.length)] });
}
function pop(b) {
  count++; document.getElementById("n").textContent = count;
  Banter.sfx("pot");
  for (let i = 0; i < 14; i++) { const a = (Math.PI * 2 * i) / 14;
    bursts.push({ x: b.x, y: b.y, vx: Math.cos(a) * (2 + Math.random() * 3), vy: Math.sin(a) * (2 + Math.random() * 3),
      r: b.r * 0.16, life: 1, color: b.color }); }
  if (count % 10 === 0) Banter.say("great", "Bubble star");
}

canvas.addEventListener("pointerdown", (e) => {
  if (!playing) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    if (Math.hypot(x - b.x, y - b.y) < b.r * 1.1) { bubbles.splice(i, 1); pop(b); return; }
  }
});

function loop() {
  ctx.clearRect(0, 0, W, H);
  if (playing) {
    spawnT--; if (spawnT <= 0 && bubbles.length < 14) { spawn(); spawnT = 28 + Math.random() * 30; }
  }
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i]; b.y += b.vy; b.wob += 0.05; b.x += Math.sin(b.wob) * 0.6;
    if (b.y < -b.r) { bubbles.splice(i, 1); continue; }
    drawBubble(b);
  }
  bursts = bursts.filter((p) => p.life > 0);
  for (const p of bursts) { p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.04;
    ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; }
  requestAnimationFrame(loop);
}
function drawBubble(b) {
  const g = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.35, b.r * 0.1, b.x, b.y, b.r);
  g.addColorStop(0, "rgba(255,255,255,0.95)");
  g.addColorStop(0.3, b.color);
  g.addColorStop(1, b.color);
  ctx.fillStyle = g; ctx.globalAlpha = 0.85;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
  ctx.strokeStyle = "rgba(255,255,255,0.8)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.beginPath(); ctx.arc(b.x - b.r * 0.35, b.y - b.r * 0.4, b.r * 0.18, 0, Math.PI * 2); ctx.fill();
}

document.getElementById("startBtn").addEventListener("click", () => {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("count").classList.remove("hidden");
  playing = true; if (window.Banter) Banter.startMusic();
  if (!started) { started = true; loop(); }
});
</script>
</body>
</html>
