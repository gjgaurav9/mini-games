<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>🔤 ABC Train — Missing Letter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    background: linear-gradient(160deg, #a7e3ff 0%, #c9f0ff 45%, #d9f7c8 100%);
    color: #2c3e50; -webkit-user-select: none; user-select: none; touch-action: manipulation;
  }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; }
  .topbar {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 14px 12px 4px; position: relative;
  }
  .stars {
    font-size: clamp(18px, 5vw, 26px); font-weight: bold; color: #e67e22;
    background: rgba(255,255,255,0.85); padding: 6px 16px; border-radius: 30px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  }
  .caseBtn {
    position: absolute; right: 12px; top: 12px;
    width: 50px; height: 44px; border: none; border-radius: 14px; cursor: pointer;
    font-family: inherit; font-size: 20px; font-weight: bold; color: #fff;
    background: #2b8fd6; box-shadow: 0 4px 0 #1f6fb2;
  }
  .caseBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1f6fb2; }
  .prompt {
    font-size: clamp(20px, 5.2vw, 30px); font-weight: bold; margin: 8px 0 2px; text-align: center;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
  }
  .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: clamp(20px, 5vh, 46px); width: 100%; padding: 8px; }
  .train { display: flex; align-items: center; justify-content: center; gap: clamp(8px, 2.5vw, 16px); }
  .car {
    width: clamp(74px, 22vw, 120px); height: clamp(90px, 26vw, 140px);
    border-radius: 22px; display: flex; align-items: center; justify-content: center;
    font-size: clamp(48px, 15vw, 84px); font-weight: bold; color: #fff;
    background: linear-gradient(160deg, #ffb24d, #f59e2e);
    box-shadow: 0 8px 0 #c97e1f, 0 12px 20px rgba(0,0,0,0.18);
    position: relative;
  }
  .car.slot {
    background: rgba(255,255,255,0.55); color: #2c3e50;
    border: 5px dashed #7aa7c7; box-shadow: inset 0 0 0 3px rgba(255,255,255,0.4);
  }
  .car.slot.filled {
    background: linear-gradient(160deg, #5fd17a, #34b85a); color: #fff;
    border: none; box-shadow: 0 8px 0 #1e8449, 0 12px 20px rgba(0,0,0,0.18);
    animation: pop .45s ease-out;
  }
  @keyframes pop { 0% { transform: scale(.3); } 60% { transform: scale(1.18); } 100% { transform: scale(1); } }
  .wheels { position: absolute; bottom: -14px; left: 0; right: 0; display: flex; justify-content: space-around; padding: 0 12px; font-size: 20px; }
  .choices { display: flex; align-items: center; justify-content: center; gap: clamp(12px, 4vw, 26px); flex-wrap: wrap; }
  .choice {
    width: clamp(78px, 23vw, 116px); height: clamp(78px, 23vw, 116px);
    border-radius: 24px; border: none; cursor: pointer;
    font-family: inherit; font-size: clamp(40px, 13vw, 70px); font-weight: bold; color: #fff;
    background: linear-gradient(160deg, #6cb2ff, #2b8fd6); box-shadow: 0 7px 0 #1f6fb2, 0 10px 18px rgba(0,0,0,0.16);
    transition: transform .1s;
  }
  .choice:active { transform: translateY(3px); }
  .choice.wrong { animation: wiggle .4s; }
  .choice.gone { opacity: 0; transform: scale(.3); pointer-events: none; transition: opacity .4s, transform .4s; }
  @keyframes wiggle { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-9px)} 50%{transform:translateX(9px)} 75%{transform:translateX(-6px)} }
  .overlay { position: fixed; inset: 0; z-index: 70; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); padding: 20px; }
  .panel { background: #fff; border-radius: 26px; padding: 28px 24px; max-width: 440px; width: 100%; text-align: center; box-shadow: 0 18px 48px rgba(0,0,0,0.5); }
  .panel .big { font-size: clamp(58px, 16vw, 96px); }
  .panel h1 { font-size: clamp(26px, 6vw, 38px); margin: 6px 0; }
  .panel p { font-size: clamp(14px, 3.6vw, 18px); color: #5d6d7e; margin: 10px 0; line-height: 1.5; }
  .panel .go { margin-top: 14px; width: 100%; padding: 15px; border: none; border-radius: 16px; font-family: inherit; font-size: clamp(19px, 5vw, 24px); font-weight: bold; cursor: pointer; background: #2b8fd6; color: #fff; box-shadow: 0 5px 0 #1f6fb2; }
  .panel .go:active { transform: translateY(3px); box-shadow: 0 2px 0 #1f6fb2; }
  .confetti { position: fixed; top: -20px; font-size: 26px; z-index: 65; pointer-events: none; will-change: transform; }
  @keyframes fall { to { transform: translateY(105vh) rotate(540deg); opacity: 0.2; } }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="stars" id="stars">⭐ 0</div>
    <button class="caseBtn" id="caseBtn" title="Big or small letters">a</button>
  </div>
  <div class="prompt" id="prompt">Which letter is missing? 🤔</div>
  <div class="stage">
    <div class="train" id="train"></div>
    <div class="choices" id="choices"></div>
  </div>
</div>
<div class="overlay" id="overlay"><div class="panel" id="panel"></div></div>

<script src="../shared/banter.js"></script>
<script>
"use strict";
const A = 65;
let upper = true;     // start with capital letters (easiest to recognise)
let stars = 0;
let answer = -1, busy = false;

const el = (id) => document.getElementById(id);
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function L(i){ const c = String.fromCharCode(A + i); return upper ? c : c.toLowerCase(); }
function nm(i){ return String.fromCharCode(A + i); }  // uppercase so TTS says the letter NAME

// ---- spoken letter names (Web Speech API; offline via the device's own voices) ----
let _voice = null;
function _pickVoice(){
  if (!("speechSynthesis" in window)) return;
  const vs = speechSynthesis.getVoices();
  _voice = vs.find(v => /en[-_]US/i.test(v.lang) && /(samantha|karen|zira|female|google us english)/i.test(v.name))
        || vs.find(v => /^en/i.test(v.lang)) || vs[0] || null;
}
if ("speechSynthesis" in window){ _pickVoice(); speechSynthesis.onvoiceschanged = _pickVoice; }
function isMuted(){ try { return localStorage.getItem("miniGames.muted") === "1"; } catch(e){ return false; } }
function speak(text, rate){
  if (!("speechSynthesis" in window) || isMuted() || !text) return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (_voice) u.voice = _voice;
    u.lang = (_voice && _voice.lang) || "en-US";
    u.rate = rate || 0.9; u.pitch = 1.15;
    speechSynthesis.speak(u);
  } catch(e){}
}

function car(text, isSlot){
  const d = document.createElement("div");
  d.className = "car" + (isSlot ? " slot" : "");
  d.textContent = text;
  const w = document.createElement("div");
  w.className = "wheels"; w.innerHTML = "<span>⚫</span><span>⚫</span>";
  d.appendChild(w);
  return d;
}

function newPuzzle(){
  busy = false;
  const start = (Math.random() * 24) | 0;   // start, start+1, start+2 all valid (0..25)
  answer = start + 1;
  // train: visible left, blank middle, visible right
  const train = el("train"); train.innerHTML = "";
  train.appendChild(car("🚂", false)).classList.add("engine");
  train.lastChild.style.background = "linear-gradient(160deg,#8e9bb3,#5d6d7e)";
  train.lastChild.style.boxShadow = "0 8px 0 #3b4757, 0 12px 20px rgba(0,0,0,0.18)";
  [start, answer, start + 2].forEach((idx, pos) => {
    if (pos === 1) { const s = car("?", true); s.id = "slot"; train.appendChild(s); }
    else train.appendChild(car(L(idx), false));
  });

  // choices: answer + two distractors not visible in the train
  const set = new Set([answer]);
  while (set.size < 3) {
    const d = (Math.random() * 26) | 0;
    if (d !== start && d !== answer && d !== start + 2) set.add(d);
  }
  const order = shuffle([...set]);
  const ch = el("choices"); ch.innerHTML = "";
  order.forEach((idx) => {
    const b = document.createElement("button");
    b.className = "choice"; b.textContent = L(idx);
    b.addEventListener("click", () => pick(idx, b));
    ch.appendChild(b);
  });
  // gentle spoken hint: name the two letters either side of the gap
  setTimeout(() => speak(nm(start) + " ... " + nm(start + 2), 0.8), 350);
}

function pick(idx, btn){
  if (busy) return;
  if (idx === answer){
    busy = true;
    Banter.sfx("great");
    speak(nm(answer));   // say the letter that was missing, e.g. "B"
    const slot = el("slot");
    slot.textContent = L(answer);
    slot.classList.add("filled");
    // other tiles float away
    [...document.querySelectorAll(".choice")].forEach((b) => { if (b !== btn) b.classList.add("gone"); });
    stars++;
    el("stars").textContent = "⭐ " + stars;
    burst(8);
    if (stars % 5 === 0){ Banter.sfx("win"); burst(40); setTimeout(newPuzzle, 1500); }
    else setTimeout(newPuzzle, 1150);
  } else {
    Banter.sfx("unlucky");
    btn.classList.remove("wrong"); void btn.offsetWidth; btn.classList.add("wrong");
  }
}

function burst(n){
  for (let i = 0; i < n; i++){
    const s = document.createElement("div");
    s.className = "confetti";
    s.textContent = ["⭐","🎉","✨","🌟","🎈"][(Math.random()*5)|0];
    s.style.left = (Math.random()*100) + "vw";
    s.style.fontSize = (18 + Math.random()*22) + "px";
    s.style.animation = `fall ${1.4 + Math.random()*1.1}s linear forwards`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2600);
  }
}

el("caseBtn").addEventListener("click", () => {
  upper = !upper;
  el("caseBtn").textContent = upper ? "a" : "A";   // shows what you'll switch TO
  Banter.sfx("click");
  newPuzzle();
});

function showIntro(){
  el("panel").innerHTML =
    `<div class="big">🔤🚂</div>
     <h1>ABC Train</h1>
     <p>One letter jumped off the train! Look at the letters on each side and tap the
        one that belongs <b>in the middle</b>.</p>
     <p>It says the letters <b>out loud</b> 🔊 to help you. Every right answer earns a ⭐ —
        there's no losing, take your time! 💛 <span style="font-size:.85em">(🔇 button mutes the voice.)</span></p>
     <button class="go" id="startBtn">Let's go! 🚂</button>`;
  el("overlay").style.display = "flex";
  el("startBtn").addEventListener("click", () => {
    el("overlay").style.display = "none";
    Banter.sfx("start");
    newPuzzle();
  });
}
showIntro();
</script>
</body>
</html>
